model:

  dev_reader: "Qwen/Qwen2.5-7B-Instruct"   # Development (T4-friendly)
  final_reader: "Qwen/Qwen2.5-72B-Instruct" # Final model (GPU cluster-A100/H100)
  retriever: "BAAI/bge-m3"  # SOTA multilingual retriever

data:
  # OUR PUBLISHED DATASET
  longsum_2025:
    dataset_name: "ashaduzzaman/LongSum-2025"
    train_split: "train"
    val_split: "validation" 
    test_split: "test"
    max_train_samples: 5000  # For dev training
    chunk_size: 1024
    chunk_overlap: 128
    max_context_length: 32768  # Qwen2.5 safe
  
  # Original baselines for comparison
  govreport:
    dataset_name: "ccdv/govreport-summarization"
    config: "3"

