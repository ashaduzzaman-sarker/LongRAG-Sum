training:
  lora:
    r: 16
    lora_alpha: 32
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
    lora_dropout: 0.05
    bias: "none"
  
  # Qwen-optimized
  learning_rate: 2e-4
  batch_size: 2
  gradient_accumulation_steps: 4
  num_epochs: 3
  warmup_steps: 100
  max_grad_norm: 0.3
  weight_decay: 0.001
  
  # Memory optimization
  use_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "float16"

evaluation:
  metrics:
    - rouge1
    - rouge2
    - rougeL
    - bertscore
    - alignscore
  batch_size: 8
  max_new_tokens: 512

paths:
  output_dir: "artifacts"
  model_dir: "artifacts/models"
  results_dir: "artifacts/results"
  checkpoints_dir: "artifacts/checkpoints"  
